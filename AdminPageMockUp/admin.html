<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>On The Go — Admin Portal</title>

<!-- Fonts: Inter (matches project exactly) -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- Font Awesome 6.4.0 (matches project exactly) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* ═══════════════════════════════════════════════════
   PROJECT DESIGN TOKENS — exact match to codebase
   ═══════════════════════════════════════════════════ */
:root {
  /* Primary Green Scale */
  --primary-50:  #E8F5E9;
  --primary-100: #C8E6C9;
  --primary-200: #A5D6A7;
  --primary-300: #81C784;
  --primary-400: #66BB6A;
  --primary-500: #4CAF50;   /* primary */
  --primary-600: #43A047;
  --primary-700: #388E3C;
  --primary-800: #2E7D32;   /* main brand */
  --primary-900: #1B5E20;

  /* Dark Mode Variables (default — project uses dark by default) */
  --bg-primary:   #121212;
  --bg-secondary: #1E1E1E;
  --bg-tertiary:  #2C2C2C;
  --text-primary:   #E8E8E8;
  --text-secondary: #B0B0B0;
  --text-tertiary:  #808080;
  --border-color:   #2C2C2C;

  /* Accent */
  --accent-500: #1976D2;
  --accent-600: #1565C0;

  /* Shadows */
  --shadow-card: 0 2px 8px rgba(0,0,0,0.3);
  --shadow-nav:  0 -1px 4px rgba(0,0,0,0.3);

  /* Layout */
  --sidebar-width: 220px;
  --sidebar-collapsed: 60px;
  --bottom-nav-height: 70px;

  /* Transitions */
  --transition: all 0.3s ease;
}

/* ── RESET & BASE ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-size: 14px;
  line-height: 1.5;
}

/* ── ANIMATIONS ── */
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes slideDown { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
@keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
.fade-in { animation: fadeIn 0.3s ease; }
.slide-down { animation: slideDown 0.3s ease; }
.slide-up { animation: slideUp 0.25s ease; }

/* ═══════════════════════════════════════════════════
   ROLE SWITCHER BAR (demo only — top of screen)
   ═══════════════════════════════════════════════════ */
.role-switcher {
  display: flex;
  background: #0a0a0a;
  border-bottom: 1px solid #1a1a1a;
  height: 40px;
  flex-shrink: 0;
}
.role-switch-btn {
  flex: 1;
  border: none;
  background: transparent;
  color: var(--text-tertiary);
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .04em;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: var(--transition);
  text-transform: uppercase;
}
.role-switch-btn:hover { color: var(--text-secondary); background: rgba(255,255,255,.03); }
.role-switch-btn.active { color: var(--primary-400); border-bottom-color: var(--primary-500); }

/* ═══════════════════════════════════════════════════
   APP SHELL
   ═══════════════════════════════════════════════════ */
.app-shell { display:flex; height: calc(100vh - 40px); overflow:hidden; }

/* ═══════════════════════════════════════════════════
   SIDEBAR — Desktop (≥ 500px)
   ═══════════════════════════════════════════════════ */
.sidebar {
  width: var(--sidebar-width);
  min-width: var(--sidebar-width);
  background: var(--bg-secondary);
  border-right: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width 0.3s ease, min-width 0.3s ease;
  z-index: 50;
}
.sidebar.collapsed { width: var(--sidebar-collapsed); min-width: var(--sidebar-collapsed); }

/* Logo */
.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 18px 16px 14px;
  border-bottom: 1px solid var(--border-color);
  flex-shrink: 0;
}
.logo-icon {
  width: 36px; height: 36px;
  background: var(--primary-800);
  border-radius: 8px;
  display: flex; align-items:center; justify-content:center;
  color: #fff; font-size: 16px;
  flex-shrink: 0;
}
.logo-text { overflow:hidden; }
.logo-name { font-size: 15px; font-weight: 700; color: var(--text-primary); white-space:nowrap; }
.logo-sub { font-size: 10px; color: var(--text-tertiary); white-space:nowrap; letter-spacing:.06em; text-transform:uppercase; margin-top:1px; }

/* Role Badge */
.role-badge {
  margin: 12px 12px 4px;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .07em;
  text-transform: uppercase;
  display: flex; align-items:center; gap: 6px;
  overflow: hidden;
  white-space: nowrap;
  flex-shrink: 0;
}
.role-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }

/* Nav Sections */
.nav-section-title {
  padding: 14px 16px 4px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text-tertiary);
  white-space: nowrap;
  overflow: hidden;
  flex-shrink: 0;
}
.sidebar.collapsed .nav-section-title { opacity: 0; }

.nav-list { list-style:none; padding: 0 8px; }
.nav-list li { margin-bottom: 2px; }
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: 8px;
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
  overflow: hidden;
  text-decoration: none;
}
.nav-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
.nav-item.active { background: var(--bg-tertiary); color: var(--primary-400); }
.nav-item.active .nav-icon { color: var(--primary-500); }
.nav-icon { width:18px; text-align:center; font-size:14px; flex-shrink:0; }
.nav-label { overflow:hidden; }
.sidebar.collapsed .nav-label { display:none; }

/* Sidebar toggle */
.sidebar-toggle {
  display: flex; align-items:center; justify-content:center;
  padding: 10px 16px;
  border-top: 1px solid var(--border-color);
  flex-shrink: 0;
}
.toggle-btn {
  background: none; border: 1px solid var(--border-color);
  color: var(--text-tertiary); border-radius:6px;
  padding: 6px 10px; cursor:pointer;
  font-size: 12px; transition: var(--transition);
  font-family:'Inter',sans-serif;
}
.toggle-btn:hover { background: var(--bg-tertiary); color: var(--text-secondary); }

/* Sidebar user */
.sidebar-user {
  padding: 12px 12px;
  border-top: 1px solid var(--border-color);
  display:flex; align-items:center; gap:10px;
  flex-shrink:0; overflow:hidden;
}
.user-avatar {
  width:32px; height:32px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:700; color:#fff; flex-shrink:0;
}
.user-info { overflow:hidden; }
.user-name { font-size:12px; font-weight:600; color:var(--text-primary); white-space:nowrap; }
.user-role { font-size:10px; color:var(--text-tertiary); white-space:nowrap; }
.sidebar.collapsed .user-info { display:none; }

/* ═══════════════════════════════════════════════════
   MAIN CONTENT AREA
   ═══════════════════════════════════════════════════ */
.main-content {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

/* TOP BAR */
.topbar {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-color);
  padding: 0 20px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  gap: 12px;
}
.topbar-left { display:flex; align-items:center; gap:12px; }
.topbar-title { font-size:16px; font-weight:700; color:var(--text-primary); }
.topbar-right { display:flex; align-items:center; gap:8px; }

/* Buttons */
.btn {
  display:inline-flex; align-items:center; gap:6px;
  padding: 8px 14px; border-radius:8px;
  font-size:13px; font-weight:600;
  font-family:'Inter',sans-serif; cursor:pointer;
  transition: var(--transition); border: none; text-decoration:none;
}
.btn-primary { background:var(--primary-500); color:#fff; }
.btn-primary:hover { background:var(--primary-600); }
.btn-secondary { background:var(--bg-tertiary); color:var(--text-secondary); border:1px solid var(--border-color); }
.btn-secondary:hover { background:#333; color:var(--text-primary); }
.btn-outline { background:transparent; color:var(--primary-400); border:1px solid var(--primary-700); }
.btn-outline:hover { background:rgba(76,175,80,.08); }
.btn-ghost { background:transparent; color:var(--text-secondary); border:1px solid var(--border-color); }
.btn-ghost:hover { background:var(--bg-tertiary); color:var(--text-primary); }
.btn-danger { background:#7f1d1d; color:#fca5a5; border:1px solid #991b1b; }
.btn-danger:hover { background:#991b1b; }
.btn-sm { padding:6px 10px; font-size:12px; }
.btn-icon { padding:8px; width:36px; height:36px; justify-content:center; }

/* PAGE SCROLL AREA */
.page-scroll {
  flex:1; overflow-y:auto; padding:20px;
}
.page-scroll::-webkit-scrollbar { width:6px; }
.page-scroll::-webkit-scrollbar-track { background:transparent; }
.page-scroll::-webkit-scrollbar-thumb { background:var(--bg-tertiary); border-radius:3px; }

/* ═══════════════════════════════════════════════════
   SHARED COMPONENTS
   ═══════════════════════════════════════════════════ */

/* Cards */
.card {
  background:var(--bg-secondary);
  border:1px solid var(--border-color);
  border-radius:10px;
  box-shadow:var(--shadow-card);
  overflow:hidden;
}
.card-header {
  padding:14px 18px;
  border-bottom:1px solid var(--border-color);
  display:flex; align-items:center; justify-content:space-between; gap:10px;
}
.card-title { font-size:14px; font-weight:700; color:var(--text-primary); }
.card-subtitle { font-size:11px; color:var(--text-tertiary); margin-top:1px; }
.card-body { padding:18px; }

/* Stat cards */
.stat-grid { display:grid; gap:14px; margin-bottom:20px; }
.stat-grid-4 { grid-template-columns:repeat(4,1fr); }
.stat-grid-3 { grid-template-columns:repeat(3,1fr); }
.stat-grid-2 { grid-template-columns:repeat(2,1fr); }
.stat-card {
  background:var(--bg-secondary);
  border:1px solid var(--border-color);
  border-radius:10px;
  padding:16px 18px;
  position:relative; overflow:hidden;
  box-shadow:var(--shadow-card);
}
.stat-card::after {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:var(--card-accent,var(--border-color));
  border-radius:10px 10px 0 0;
}
.stat-label { font-size:11px; font-weight:600; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px; }
.stat-value { font-size:24px; font-weight:700; color:var(--text-primary); line-height:1; }
.stat-sub { font-size:11px; color:var(--text-tertiary); margin-top:6px; }
.stat-badge {
  display:inline-flex; align-items:center; gap:3px;
  font-size:11px; font-weight:600; padding:2px 7px; border-radius:4px; margin-top:6px;
}
.badge-up { background:rgba(76,175,80,.15); color:var(--primary-400); }
.badge-down { background:rgba(220,38,38,.15); color:#f87171; }
.badge-neutral { background:var(--bg-tertiary); color:var(--text-tertiary); }

/* Status Pills */
.pill {
  display:inline-flex; align-items:center; gap:4px;
  padding:3px 9px; border-radius:20px;
  font-size:11px; font-weight:600;
}
.pill-dot { width:5px; height:5px; border-radius:50%; background:currentColor; }
.pill-green { background:rgba(76,175,80,.12); color:var(--primary-400); }
.pill-blue  { background:rgba(25,118,210,.12); color:#60a5fa; }
.pill-amber { background:rgba(217,119,6,.12);  color:#fbbf24; }
.pill-red   { background:rgba(220,38,38,.12);  color:#f87171; }
.pill-grey  { background:var(--bg-tertiary); color:var(--text-secondary); }
.pill-purple{ background:rgba(124,58,237,.12); color:#a78bfa; }

/* Tables */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; }
thead th {
  text-align:left; padding:10px 14px;
  font-size:11px; font-weight:700; color:var(--text-tertiary);
  text-transform:uppercase; letter-spacing:.06em;
  background:var(--bg-primary); border-bottom:1px solid var(--border-color);
  white-space:nowrap;
}
tbody td {
  padding:12px 14px; font-size:13px; color:var(--text-secondary);
  border-bottom:1px solid var(--border-color);
}
tbody tr:last-child td { border-bottom:none; }
tbody tr:hover td { background:rgba(255,255,255,.02); }

/* Form Elements */
.form-group { margin-bottom:16px; }
.form-label { display:block; font-size:11px; font-weight:700; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px; }
.form-input {
  width:100%; padding:10px 12px;
  background:var(--bg-primary); border:1px solid var(--border-color);
  border-radius:8px; color:var(--text-primary);
  font-size:13px; font-family:'Inter',sans-serif;
  outline:none; transition:var(--transition);
}
.form-input:focus { border-color:var(--primary-500); box-shadow:0 0 0 3px rgba(76,175,80,.12); }
.form-input::placeholder { color:var(--text-tertiary); }
select.form-input { cursor:pointer; }
textarea.form-input { resize:vertical; min-height:90px; }

/* Tabs */
.tab-list { display:flex; gap:0; background:var(--bg-primary); padding:4px; border-radius:8px; margin-bottom:18px; }
.tab-btn {
  flex:1; padding:7px 12px; background:none; border:none; border-radius:6px;
  font-size:12px; font-weight:600; cursor:pointer;
  font-family:'Inter',sans-serif; color:var(--text-tertiary); transition:.15s; text-align:center;
}
.tab-btn.active { background:var(--bg-secondary); color:var(--text-primary); box-shadow:0 1px 4px rgba(0,0,0,.3); }

/* Alerts */
.alert { display:flex; gap:10px; padding:12px 14px; border-radius:8px; margin-bottom:14px; font-size:12px; align-items:flex-start; }
.alert-warn { background:rgba(217,119,6,.08); border:1px solid rgba(217,119,6,.25); color:#fbbf24; }
.alert-danger { background:rgba(220,38,38,.08); border:1px solid rgba(220,38,38,.25); color:#f87171; }
.alert-info  { background:rgba(25,118,210,.08); border:1px solid rgba(25,118,210,.25); color:#60a5fa; }
.alert-success{ background:rgba(76,175,80,.08);  border:1px solid rgba(76,175,80,.25);  color:var(--primary-400); }

/* Progress Bar */
.progress-wrap { height:6px; background:var(--bg-tertiary); border-radius:3px; overflow:hidden; }
.progress-fill { height:100%; border-radius:3px; transition:.5s; }

/* Map placeholder */
.map-mock {
  background: linear-gradient(135deg,#0a1628,#0f2035,#0a1628);
  border-radius:8px; position:relative; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
}
.map-bus { position:absolute; width:10px; height:10px; border-radius:50%; border:2px solid rgba(76,175,80,.8); }
.map-bus::after { content:''; position:absolute; inset:-4px; border-radius:50%; border:1px solid rgba(76,175,80,.3); animation:busping 2s infinite; }
@keyframes busping { 0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.5} }

/* Live dot */
.live-dot { display:inline-flex; align-items:center; gap:5px; font-size:11px; font-weight:600; color:var(--primary-400); }
.live-dot::before { content:''; width:7px; height:7px; border-radius:50%; background:var(--primary-500); animation:pulse 1.5s infinite; }

/* Section spacing */
.mb-4 { margin-bottom:16px; }
.mb-5 { margin-bottom:20px; }
.mb-6 { margin-bottom:24px; }
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
.flex { display:flex; }
.items-center { align-items:center; }
.gap-2 { gap:8px; }
.gap-3 { gap:12px; }
.ml-auto { margin-left:auto; }

/* SVG charts */
.chart-svg { width:100%; height:140px; }

/* Avatar */
.avatar {
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-weight:700; color:#fff; flex-shrink:0;
}
.av-sm { width:32px; height:32px; font-size:12px; }
.av-md { width:40px; height:40px; font-size:14px; }
.av-lg { width:48px; height:48px; font-size:16px; }

/* Person card row */
.person-row {
  display:flex; align-items:center; gap:12px; padding:12px 0;
  border-bottom:1px solid var(--border-color);
}
.person-row:last-child { border-bottom:none; }
.person-info { flex:1; min-width:0; }
.person-name { font-size:13px; font-weight:600; color:var(--text-primary); }
.person-meta { font-size:11px; color:var(--text-tertiary); margin-top:1px; }

/* Activity feed */
.feed-item { display:flex; gap:10px; padding:10px 0; border-bottom:1px solid var(--border-color); }
.feed-item:last-child { border-bottom:none; }
.feed-icon { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
.feed-text { font-size:12px; color:var(--text-secondary); line-height:1.5; }
.feed-time { font-size:10px; color:var(--text-tertiary); margin-top:2px; }

/* Skeleton */
.skeleton { background:var(--bg-tertiary); border-radius:4px; animation:pulse 1.5s infinite; }

/* ═══════════════════════════════════════════════════
   MOBILE BOTTOM NAV (< 500px)
   ═══════════════════════════════════════════════════ */
.bottom-nav {
  display:none;
  position:fixed; bottom:0; left:0; right:0;
  height:var(--bottom-nav-height);
  background:var(--bg-secondary);
  border-top:1px solid var(--border-color);
  box-shadow:var(--shadow-nav);
  z-index:100;
}
.bottom-nav-list { display:flex; height:100%; }
.bottom-nav-item {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:4px; cursor:pointer; color:var(--text-tertiary);
  font-size:10px; font-weight:500; transition:var(--transition); padding:8px 4px;
  border:none; background:none; font-family:'Inter',sans-serif;
}
.bottom-nav-item i { font-size:20px; }
.bottom-nav-item.active { color:var(--primary-500); }

/* ── RESPONSIVE ── */
@media (max-width:499px) {
  .sidebar { display:none; }
  .bottom-nav { display:flex; }
  .page-scroll { padding:14px 14px 80px; }
  .stat-grid-4 { grid-template-columns:repeat(2,1fr); }
  .stat-grid-3 { grid-template-columns:repeat(2,1fr); }
  .grid-2 { grid-template-columns:1fr; }
  .grid-3 { grid-template-columns:1fr; }
  .topbar { padding:0 14px; }
  .topbar-title { font-size:14px; }
  .hide-mobile { display:none !important; }
}
@media (min-width:500px) and (max-width:768px) {
  .stat-grid-4 { grid-template-columns:repeat(2,1fr); }
  .grid-3 { grid-template-columns:1fr 1fr; }
}

/* ── PAGE VISIBILITY ── */
.page { display:none; animation:fadeIn .2s ease; }
.page.active { display:block; }
</style>
</head>
<body>

<!-- ROLE SWITCHER (demo UI) -->
<div class="role-switcher">
  <button class="role-switch-btn active" data-role="driver" onclick="setRole('driver',this)"><i class="fas fa-bus-alt" style="margin-right:4px"></i> Driver</button>
  <button class="role-switch-btn" data-role="manager" onclick="setRole('manager',this)"><i class="fas fa-user-tie" style="margin-right:4px"></i> Manager</button>
  <button class="role-switch-btn" data-role="admin" onclick="setRole('admin',this)"><i class="fas fa-building" style="margin-right:4px"></i> Admin</button>
  <button class="role-switch-btn" data-role="rura" onclick="setRole('rura',this)"><i class="fas fa-landmark" style="margin-right:4px"></i> RURA</button>
</div>

<!-- APP SHELL -->
<div class="app-shell">

  <!-- ══════════════════════════════════════
       SIDEBAR
       ══════════════════════════════════════ -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- ══════════════════════════════════════
       MAIN CONTENT
       ══════════════════════════════════════ -->
  <div class="main-content">
    <header class="topbar" id="topbar"></header>
    <div class="page-scroll" id="pageContent"></div>
  </div>

</div>

<!-- MOBILE BOTTOM NAV -->
<nav class="bottom-nav" id="bottomNav"></nav>

<!-- ═════════════════════════════════════════════════
     PAGE TEMPLATES
     ═════════════════════════════════════════════════ -->
<script>
// ─── DATA ───────────────────────────────────────
const ROLES = {
  driver: {
    label:'Driver', color:'#4CAF50', icon:'fa-bus-alt', initials:'JC',
    name:'Jean Claude N.', subtitle:'Kigali Express Bus',
    nav:[
      { section:'My Shift', items:[

let currentRole = 'driver'
let currentPage = 'dashboard'
let sidebarCollapsed = false

// ─── INIT ────────────────────────────────────────
function setRole(role, btn) {
  document.querySelectorAll('.role-switch-btn').forEach(b=>b.classList.remove('active'))
  btn.classList.add('active')
  currentRole = role
  currentPage = 'dashboard'
  renderAll()
}
function setPage(page) {
  currentPage = page
  document.querySelectorAll('.nav-item').forEach(a=>a.classList.toggle('active', a.dataset.page===page))
  document.querySelectorAll('.bottom-nav-item').forEach(a=>a.classList.toggle('active', a.dataset.page===page))
  renderTopbar()
  renderContent()
}
function toggleSidebar() {
  sidebarCollapsed = !sidebarCollapsed
  const sb = document.getElementById('sidebar')
  sb.classList.toggle('collapsed', sidebarCollapsed)
}

function renderAll() {
  renderSidebar()
  renderTopbar()
  renderContent()
  renderBottomNav()
}

// ─── SIDEBAR ─────────────────────────────────────
function renderSidebar() {
  const r = ROLES[currentRole]
  let html = `
    <div class="sidebar-logo">
      <div class="logo-icon"><i class="fas fa-bus"></i></div>
      <div class="logo-text"><div class="logo-name">On The Go</div><div class="logo-sub">Rwanda Transit</div></div>
    </div>
    <div class="role-badge" style="background:${r.color}15;color:${r.color}">
      <div class="role-dot" style="background:${r.color}"></div>
      <span class="nav-label">${r.label}</span>
    </div>`

  r.nav.forEach(sec => {
    html += `<div class="nav-section-title">${sec.section}</div><ul class="nav-list">`
    sec.items.forEach(item => {
      const active = item.id === currentPage ? 'active' : ''
      html += `<li><a class="nav-item ${active}" data-page="${item.id}" onclick="setPage('${item.id}')">
        <span class="nav-icon"><i class="fas ${item.icon}"></i></span>
        <span class="nav-label">${item.label}</span>
      </a></li>`
    })
    html += `</ul>`
  })

  html += `
    <div style="flex:1"></div>
    <div class="sidebar-toggle">
      <button class="toggle-btn" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i> <span class="nav-label" style="margin-left:4px">Collapse</span>
      </button>
    </div>
    <div class="sidebar-user">
      <div class="avatar av-sm" style="background:${r.color}">${r.initials}</div>
      <div class="user-info"><div class="user-name">${r.name}</div><div class="user-role">${r.subtitle}</div></div>
    </div>`

  document.getElementById('sidebar').innerHTML = html
  document.getElementById('sidebar').classList.toggle('collapsed', sidebarCollapsed)
}

// ─── BOTTOM NAV ──────────────────────────────────
function renderBottomNav() {
  const r = ROLES[currentRole]
  let html = `<div class="bottom-nav-list">`
  r.mobile.forEach(item => {
    const active = item.id === currentPage ? 'active' : ''
    html += `<button class="bottom-nav-item ${active}" data-page="${item.id}" onclick="setPage('${item.id}')">
      <i class="fas ${item.icon}"></i><span>${item.label}</span>
    </button>`
  })
  html += `</div>`
  document.getElementById('bottomNav').innerHTML = html
}

                <div class="progress-wrap" style="height:8px"><div class="progress-fill" style="width:${pct}%;background:${c}"></div></div>

              </div>
              <div class="form-group"><label class="form-label">Expires</label><input class="form-input" type="date"></div>

                  <span class="pill ${type==='warning'?'pill-amber':'pill-blue'}" style="font-size:10px;flex-shrink:0">${type}</span>
                </div>
                <div style="display:flex;gap:12px;font-size:11px;color:var(--text-tertiary)">
                  <span><i class="fas fa-users"></i> ${target}</span>
                  <span><i class="fas fa-clock"></i> ${exp}</span>

                <div style="display:flex;gap:6px;margin-top:8px">
                  <button class="btn btn-ghost btn-sm"><i class="fas fa-edit"></i> Edit</button>

        </div>
